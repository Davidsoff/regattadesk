bounded_context:
  id: FEGAP
  name: Frontend PRD Gap Remediation
  source_spec: pdd/idea-honing.md

tickets:
  - id: FEGAP-001
    title: "[FE] Establish multi-surface frontend shell and routing (staff/operator/public)"
    labels:
      - type:feature
      - area:frontend-foundation
      - priority:p0
      - milestone:v0.1
    depends_on:
      - BC01-001
    plan_coverage:
      - Step 1
      - Step 5
      - Step 21
      - Step 22
    nfr_coverage:
      - API-first client architecture across all UX surfaces
      - Deterministic navigation structure and role/token boundaries
    body: |
      ## Summary
      Replace the single-page finance-only bootstrap with a route-driven app shell that supports all v0.1 UX surfaces: Staff Web, Operator PWA, and Public Web.

      ## Current Gap Evidence
      - `apps/frontend/src/App.vue` only mounts `FinanceBulkPaymentWorkflow` after manual UUID entry.
      - `apps/frontend/package.json` has no router dependency or route test tooling.

      ## Scope
      - Add Vue Router with explicit route trees for:
        - Staff (`/staff/regattas/{regatta_id}/...`)
        - Operator (`/operator/regattas/{regatta_id}/...`)
        - Public versioned paths (`/public/v{draw_revision}-{results_revision}/...`)
      - Add surface-specific layout shells with predictable landmarks and skip links.
      - Add route guards for role-scoped staff routes and token-scoped operator routes.
      - Remove the ad hoc regatta-id gate from the app root.

      ## Out of Scope
      - Feature-complete page implementations for each route.
      - Backend auth implementation changes.

      ## Implementation Tasks
      1. Add and configure Vue Router with lazy-loaded route modules.
      2. Implement route-level auth context guards for staff/operator/public.
      3. Create shell layouts with consistent navigation and focus management.
      4. Replace `App.vue` bootstrap with router host.

      ## Acceptance Criteria
      - App starts at a routed entry point, not a finance-only component.
      - Staff/operator/public routes are independently addressable and testable.
      - Unauthorized role/token context blocks protected routes with clear UX.

      ## Test Requirements
      - Route unit/integration tests for guard behavior and redirects.
      - Smoke test for deep-linking across all three surfaces.

      ## References
      - pdd/idea-honing.md
      - pdd/design/style-guide.md
      - pdd/implementation/plan.md

  - id: FEGAP-002
    title: "[FE] Build shared API client layer aligned to OpenAPI contracts and error model"
    labels:
      - type:feature
      - area:frontend-foundation
      - area:public-api
      - priority:p0
      - milestone:v0.1
    depends_on:
      - FEGAP-001
    plan_coverage:
      - Step 5
      - Step 7
      - Step 15
      - Step 16
      - Step 19
      - Step 22
    nfr_coverage:
      - Stable machine-readable error handling at UI boundaries
      - Deterministic request behavior for retry-prone flows
    body: |
      ## Summary
      Introduce a shared frontend API client layer so all surfaces consume backend contracts consistently and stop using ad hoc `fetch` logic per component.

      ## Current Gap Evidence
      - `apps/frontend/src/components/FinanceBulkPaymentWorkflow.vue` performs direct inline `fetch` calls and inline error parsing.

      ## Scope
      - Add a reusable API client module for staff/operator/public endpoints in `openapi-v0.1.yaml`.
      - Centralize auth/session handling hooks, error normalization, and request metadata.
      - Normalize handling of API error shape (`error.code`, `error.message`, `request_id` when present).
      - Add typed domain adapters/view-model mappers for schedule/results/finance/operator flows.

      ## Out of Scope
      - Server-side API contract changes.
      - Replacing all existing pages in one PR.

      ## Implementation Tasks
      1. Add API module structure by bounded context.
      2. Implement shared response/error decoding.
      3. Add idempotency-aware helper for retry-safe operations.
      4. Migrate existing finance workflow to the shared client.

      ## Acceptance Criteria
      - No new feature page uses direct raw `fetch` in component logic.
      - API errors render consistent user-facing and debug-facing metadata.
      - Client module covers public/session bootstrap and operator/staff auth modes.

      ## Test Requirements
      - Unit tests for response parsing and error normalization.
      - Contract-oriented tests against representative OpenAPI response fixtures.

      ## References
      - pdd/design/openapi-v0.1.yaml
      - pdd/implementation/plan.md

  - id: FEGAP-007
    title: "[FE] Build staff regatta management workflows (events, entries, crews, athletes, withdrawals)"
    labels:
      - type:feature
      - area:staff-web
      - priority:p0
      - milestone:v0.1
    depends_on:
      - FEGAP-001
      - FEGAP-002
      - BC03-004
    plan_coverage:
      - Step 5
    nfr_coverage:
      - API-first staff UI parity with backend contracts
      - Explicit validation and actionable error UX
    body: |
      ## Summary
      Implement the missing staff CRUD and workflow pages for core regatta management.

      ## Current Gap Evidence
      - No staff CRUD page components/routes exist in frontend source.
      - App currently exposes only a finance bulk form.
      - Minimum backend/OpenAPI support for regatta setup routes is missing for event groups, events, crews, entry list/create, and withdraw/reinstate actions.

      ## Scope
      - Implement staff pages for:
        - events and event-group assignment
        - athletes and crews
        - entries with status/withdrawal actions
      - Add searchable/filterable tables and action forms.
      - Surface audit-oriented metadata for destructive changes.
      - Add the minimum backend/OpenAPI support required for the frontend to consume real setup workflows end-to-end.

      ## Out of Scope
      - Draw publish and ruleset workflows.
      - Investigation/approval workflows.

      ## Implementation Tasks
      1. Build route modules and list/detail/edit views for core entities.
      2. Wire create/update/delete/status actions to API client layer.
      3. Add filter/search and bulk action confirmation UX.
      4. Add contextual 409 conflict handling UI patterns.
      5. Add minimum setup endpoints/contracts for event groups, events, crews, entries, and entry withdraw/reinstate.

      ## Acceptance Criteria
      - Staff can execute v0.1 core CRUD flows entirely via frontend UI.
      - Validation errors and conflict errors are surfaced clearly.
      - Keyboard and focus behavior remain usable in dense tables/forms.

      ## Test Requirements
      - Component and integration tests for CRUD happy paths + validation failures.
      - Regression tests for withdrawal state transitions.
      - Contract/backend integration tests for setup endpoints added to unblock the frontend workflow.

      ## References
      - pdd/implementation/bc03-core-regatta-management.md
      - pdd/design/openapi-v0.1.yaml
      - pdd/design/style-guide.md

  - id: FEGAP-008
    title: "[FE] Build staff rules, blocks, bib-pools, and draw publish workflows"
    labels:
      - type:feature
      - area:staff-web
      - area:draw
      - priority:p1
      - milestone:v0.1
    depends_on:
      - FEGAP-007
      - BC04-003
    plan_coverage:
      - Step 12
      - Step 13
      - Step 14
    nfr_coverage:
      - Draw reproducibility and revision traceability
      - Post-draw immutability guardrails
    body: |
      ## Summary
      Implement staff UI for rulesets, scheduling blocks, bib pools, and draw generation/publication.

      ## Current Gap Evidence
      - No frontend screens exist for rulesets, blocks, bib pools, or draw lifecycle actions.

      ## Scope
      - Add ruleset list/detail/create/update/duplicate flows.
      - Add super_admin-only promotion affordance and guard.
      - Add block timing and bib-pool management UI.
      - Add draw generate/publish/unpublish UX with explicit revision impact messaging.

      ## Out of Scope
      - Public schedule rendering.
      - Operator capture workflow.

      ## Implementation Tasks
      1. Create ruleset and schedule configuration pages.
      2. Implement draw preview, seed visibility, and publish confirmation UX.
      3. Enforce frontend guardrails for post-draw immutability constraints.
      4. Add validation/error display for bib-pool overlap and ruleset constraints.

      ## Acceptance Criteria
      - Staff can configure and publish draw workflow end-to-end via UI.
      - UI blocks invalid post-draw edits per v0.1 constraints.
      - Draw publication clearly communicates `draw_revision` increments.

      ## Test Requirements
      - Integration tests for draw lifecycle and immutability errors.
      - UI tests for ruleset promotion visibility by role.

      ## References
      - pdd/implementation/bc04-rules-scheduling-and-draw.md
      - pdd/design/openapi-v0.1.yaml
      - pdd/design/style-guide.md

  - id: FEGAP-010
    title: "[FE] Complete staff finance surface and correct current bulk-payment UX misalignments"
    labels:
      - type:feature
      - area:finance
      - area:staff-web
      - priority:p1
      - milestone:v0.1
    depends_on:
      - FEGAP-007
      - FEGAP-002
      - BC08-001
    plan_coverage:
      - Step 15
    nfr_coverage:
      - Role-scoped financial operations with auditable UI paths
      - Consistent, non-misleading realtime indicators by surface
    body: |
      ## Summary
      Expand finance from one bulk form to full v0.1 staff finance workflows and fix behavior currently misaligned with PRD expectations.

      ## Current Gap Evidence
      - App root requires manual regatta-id entry before showing finance flow.
      - Current finance component opens public SSE and displays Live/Offline, which is specified for public results UX.
      - No UI exists for:
        - `GET/PUT /entries/{entry_id}/payment_status`
        - `GET/PUT /clubs/{club_id}/payment_status`
        - invoice list/generation/mark-paid flows

      ## Scope
      - Keep and harden bulk mark paid/unpaid workflow.
      - Add per-entry and per-club payment status pages.
      - Add invoice generation/list/detail/mark-paid flows.
      - Remove public SSE status indicator from finance UI.
      - Use route-derived regatta context and staff shell navigation.

      ## Out of Scope
      - Payment-provider integrations beyond v0.1 API.
      - Public results realtime behavior.

      ## Implementation Tasks
      1. Add finance route module under staff shell.
      2. Implement entry/club payment status views and edit actions.
      3. Implement invoice workflow UI against invoice endpoints.
      4. Refactor existing bulk form into shared finance module and remove SSE pill.

      ## Acceptance Criteria
      - Staff can perform entry, club, and bulk payment updates from UI.
      - Invoice generation and mark-paid workflow is available in staff finance pages.
      - Finance pages no longer show public-live SSE connection state.

      ## Test Requirements
      - Integration tests for entry/club/bulk payment operations.
      - UI tests for invoice workflow and failure handling.

      ## References
      - pdd/implementation/bc08-finance-and-payments.md
      - pdd/design/openapi-v0.1.yaml
      - pdd/idea-honing.md

  - id: FEGAP-011
    title: "[FE] Build operator token lifecycle and non-interrupting station handoff PIN UX"
    labels:
      - type:feature
      - area:operator-pwa
      - priority:p0
      - milestone:v0.1
    depends_on:
      - FEGAP-001
      - FEGAP-002
      - BC06-001
    plan_coverage:
      - Step 16
    nfr_coverage:
      - Non-interrupting token/PIN flow for active capture
      - Explicit station authority and read-only demotion states
    body: |
      ## Summary
      Implement operator access UX for token validation, token management, and station handoff PIN flows without blocking active capture.

      ## Current Gap Evidence
      - No operator routes or components exist for token or handoff flows.

      ## Scope
      - Build operator access shell and token status UI.
      - Add handoff request/reveal/complete/cancel workflow screens and banners.
      - Enforce non-blocking PIN UX from active station.
      - Show read-only state after successful handoff and re-auth affordance.

      ## Out of Scope
      - Marker editing/capture timeline tooling.
      - Staff admin pages.

      ## Implementation Tasks
      1. Add operator auth context and token validity checks.
      2. Implement station handoff flow states from API contract.
      3. Implement non-modal request notifications and PIN reveal actions.
      4. Add read-only demotion UX and recovery path.

      ## Acceptance Criteria
      - Handoff can complete from operator UI using API contract paths.
      - Active capture UI remains usable during handoff requests.
      - Previous device clearly transitions to read-only after handoff.

      ## Test Requirements
      - Integration tests for handoff success/error states (`400 INVALID_PIN`, `409` conflicts).
      - UI tests for non-interrupting banner/toast behavior.

      ## References
      - pdd/implementation/bc06-operator-capture-and-line-scan.md
      - pdd/design/openapi-v0.1.yaml
      - pdd/design/style-guide.md

  - id: FEGAP-012
    title: "[FE] Build operator line-scan capture UI (overview/detail, marker CRUD, linking, lock states)"
    labels:
      - type:feature
      - area:operator-pwa
      - area:line-scan
      - priority:p0
      - milestone:v0.1
    depends_on:
      - FEGAP-011
      - BC06-003
    plan_coverage:
      - Step 17
      - Step 19
    nfr_coverage:
      - Outdoor-readable capture-first workflow
      - Explicit immutability behavior for approved markers
    body: |
      ## Summary
      Implement operator capture workspace for line-scan evidence and marker workflows required for start/finish linking.

      ## Current Gap Evidence
      - No operator capture or marker management components exist in frontend source.

      ## Scope
      - Full-screen capture view with:
        - overview strip
        - draggable detail window/loupe
        - marker create/move/delete
        - marker link/unlink to entries
      - Show unlinked markers first and support quick "Link bib" flows.
      - Lock approved markers from destructive edits and indicate immutable state.
      - Keep undo visible for operator corrections.

      ## Out of Scope
      - Offline queue sync internals.
      - Staff adjudication decisions.

      ## Implementation Tasks
      1. Implement capture session and marker data adapters.
      2. Build timeline/canvas interactions for marker manipulation.
      3. Implement linking UX and completion-state feedback.
      4. Add immutable lock behavior for approved markers.

      ## Acceptance Criteria
      - Operators can create/link/adjust markers without leaving capture workspace.
      - Approved markers are clearly locked and non-editable.
      - Unlinked marker selection recenters detail view.

      ## Test Requirements
      - Component tests for marker state transitions and lock behavior.
      - Interaction tests for keyboard/touch alternatives to drag actions.

      ## References
      - pdd/idea-honing.md
      - pdd/design/style-guide.md
      - pdd/design/openapi-v0.1.yaml

  - id: FEGAP-014
    title: "[FE] Build printable export UX (async jobs, status polling, download flow, header metadata checks)"
    labels:
      - type:feature
      - area:printing
      - area:staff-web
      - priority:p1
      - milestone:v0.1
    depends_on:
      - FEGAP-007
      - BC05-007
    plan_coverage:
      - Step 10
    nfr_coverage:
      - A4 monochrome-friendly print workflow
      - Deterministic job-state polling and user feedback
    body: |
      ## Summary
      Implement frontend print/export workflow using async export jobs and present clear status/download behavior for staff users.

      ## Current Gap Evidence
      - `PrintHeader.vue` and `print.css` exist, but no staff UI exists for `/api/v1/regattas/{regatta_id}/export/printables` and `/api/v1/jobs/{job_id}`.

      ## Scope
      - Add staff print/export action points in relevant pages.
      - Submit print job requests and poll job status (`pending|processing|completed|failed`).
      - Present completed downloads and failed-job diagnostics.
      - Validate rendered header metadata expectations (regatta, timestamp, draw/results rev, page).

      ## Out of Scope
      - Backend PDF renderer internals.
      - New custom report templates beyond v0.1 scope.

      ## Implementation Tasks
      1. Implement export request and polling service.
      2. Add print job status UI component(s) with retry affordances.
      3. Integrate print header metadata checks into print preview/download QA path.
      4. Add UX copy for expiration behavior of export jobs.

      ## Acceptance Criteria
      - Staff can request and retrieve print exports from UI.
      - Job states are visible and actionable without page reload.
      - Exported outputs meet required metadata/header visibility.

      ## Test Requirements
      - Integration tests for job polling success and failure paths.
      - Snapshot/integration checks for print header metadata rendering.

      ## References
      - pdd/implementation/bc05-public-experience-and-delivery.md
      - pdd/design/openapi-v0.1.yaml
      - pdd/design/style-guide.md

  - id: FEGAP-015
    title: "[FE] Enforce frontend accessibility and test quality gates (axe/lighthouse + critical-flow E2E)"
    labels:
      - type:quality
      - area:accessibility
      - area:qa
      - priority:p0
      - milestone:v0.1
    depends_on:
      - BC05-004
      - BC05-005
      - FEGAP-010
      - BC06-005
    plan_coverage:
      - Step 9
      - Step 25
    nfr_coverage:
      - WCAG 2.2 AA release gate for public flows
      - Deterministic frontend quality gates in CI
    body: |
      ## Summary
      Replace placeholder frontend quality checks with enforceable accessibility and critical-flow tests aligned to the PRD test matrix.

      ## Current Gap Evidence
      - `apps/frontend/package.json` defines `test:a11y` as a placeholder script that exits with failure text only.
      - `apps/frontend/tests/accessibility/README.md` contains examples, but no active CI-usable accessibility test suite.

      ## Scope
      - Add automated accessibility scans for public schedule/results and core staff/operator flows.
      - Add Lighthouse accessibility checks for public routes.
      - Add deterministic critical-flow E2E tests across staff, operator, and public surfaces.
      - Gate CI on critical/serious accessibility regressions.

      ## Out of Scope
      - Performance benchmark gating based on timing thresholds.
      - Non-deterministic flaky browser checks.

      ## Implementation Tasks
      1. Implement real `test:a11y` script and supporting test config.
      2. Add automated scans for key pages/components.
      3. Add E2E tests for bootstrap/SSE/public results and operator offline sync basics.
      4. Wire artifacts and pass/fail policies into CI.

      ## Acceptance Criteria
      - Accessibility tests run in CI with actionable reports.
      - Public routes meet WCAG 2.2 AA gating threshold.
      - Critical frontend flows have deterministic automated coverage.

      ## Test Requirements
      - CI job coverage for accessibility scans and E2E smoke paths.
      - Manual keyboard/screen-reader checklist evidence attached to release checklist.

      ## References
      - pdd/implementation/plan.md
      - pdd/design/style-guide.md
      - pdd/idea-honing.md
